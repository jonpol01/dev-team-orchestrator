# Ollama service for local LLM inference
# Usage: docker compose -f ../n8n-docker-stack/docker-compose.yaml -f docker-compose.override.yaml up -d
# Or copy this service block into n8n-docker-stack/docker-compose.yaml

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # --- Kubernetes API access for n8n (verification jobs) ---
  # Uncomment and configure after setting up K8s (see k8s/README.md)
  # n8n:
  #   environment:
  #     - K8S_API_URL=https://kubernetes.docker.internal:6443   # Docker Desktop K8s
  #     - K8S_NAMESPACE=dev-team
  #     - K8S_TOKEN=${K8S_SA_TOKEN}                             # from: kubectl get secret n8n-job-runner-token -n dev-team -o jsonpath='{.data.token}' | base64 -d

volumes:
  ollama_data:
