<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="200" rx="16" fill="url(#bgGrad)"/>
  <text x="550" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Full Pipeline</text>

  <!-- Phase 1 -->
  <rect x="15" y="50" width="130" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="76" text-anchor="middle" font-size="18">&#x1F4AC;</text>
  <text x="80" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">1. Discord</text>
  <text x="80" y="110" text-anchor="middle" font-size="8" fill="#b45309">AI Intent Parser</text>

  <line x1="147" y1="85" x2="163" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <rect x="166" y="50" width="145" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="238" y="76" text-anchor="middle" font-size="18">&#x1F9E0;</text>
  <text x="238" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">2. Architect</text>
  <text x="238" y="110" text-anchor="middle" font-size="8" fill="#2563eb">Plan + scaffold + branch</text>

  <line x1="313" y1="85" x2="329" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <rect x="332" y="50" width="180" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="422" y="76" text-anchor="middle" font-size="18">&#x26A1;&#x1F441;</text>
  <text x="422" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">3. Exec / Review</text>
  <text x="422" y="110" text-anchor="middle" font-size="8" fill="#15803d">Code, commit, review loop</text>

  <line x1="514" y1="85" x2="530" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4 -->
  <rect x="533" y="50" width="145" height="70" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="605" y="76" text-anchor="middle" font-size="18">&#x2638;</text>
  <text x="605" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#155e75">4. K8s Verify</text>
  <text x="605" y="110" text-anchor="middle" font-size="8" fill="#0891b2">DinD build + health</text>

  <line x1="680" y1="85" x2="696" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 5 -->
  <rect x="699" y="50" width="130" height="70" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="764" y="76" text-anchor="middle" font-size="18">&#x1F310;</text>
  <text x="764" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">5. Deploy</text>
  <text x="764" y="110" text-anchor="middle" font-size="8" fill="#c2410c">K8s Service</text>

  <line x1="831" y1="85" x2="847" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 6 -->
  <rect x="850" y="50" width="140" height="70" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="920" y="76" text-anchor="middle" font-size="18">&#x1F680;</text>
  <text x="920" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#9d174d">6. PR + Report</text>
  <text x="920" y="110" text-anchor="middle" font-size="8" fill="#be185d">GitHub PR + Discord</text>

  <!-- Retry arrow -->
  <path d="M605,122 C605,168 422,168 422,122" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)" fill="none"/>
  <rect x="455" y="155" width="170" height="22" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">$auto: retry on failure (max 3)</text>
</svg>