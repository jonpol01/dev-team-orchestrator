<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="16" fill="url(#bgGrad)"/>

  <text x="450" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Full Pipeline</text>

  <!-- Phase 1 -->
  <rect x="20" y="50" width="140" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="76" text-anchor="middle" font-size="20">&#x1F4AC;</text>
  <text x="90" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">1. Discord</text>
  <text x="90" y="110" text-anchor="middle" font-size="9" fill="#b45309">$team / $ralph</text>

  <line x1="162" y1="85" x2="182" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <rect x="185" y="50" width="140" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="76" text-anchor="middle" font-size="20">&#x1F9E0;</text>
  <text x="255" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">2. Architect</text>
  <text x="255" y="110" text-anchor="middle" font-size="9" fill="#2563eb">Plan + branch</text>

  <line x1="327" y1="85" x2="347" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <rect x="350" y="50" width="180" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="76" text-anchor="middle" font-size="20">&#x26A1;&#x1F441;</text>
  <text x="440" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">3. Exec / Review</text>
  <text x="440" y="110" text-anchor="middle" font-size="9" fill="#15803d">Code, commit, review loop</text>

  <line x1="532" y1="85" x2="552" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4 -->
  <rect x="555" y="50" width="150" height="70" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="630" y="76" text-anchor="middle" font-size="20">&#x2638;</text>
  <text x="630" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#155e75">4. K8s Verify</text>
  <text x="630" y="110" text-anchor="middle" font-size="9" fill="#0891b2">Build + test in pod</text>

  <line x1="707" y1="85" x2="727" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 5 -->
  <rect x="730" y="50" width="150" height="70" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="805" y="76" text-anchor="middle" font-size="20">&#x1F680;</text>
  <text x="805" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#9d174d">5. PR + Report</text>
  <text x="805" y="110" text-anchor="middle" font-size="9" fill="#be185d">GitHub PR + Discord</text>

  <!-- Retry arrow -->
  <path d="M630,122 C630,168 440,168 440,122" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)" fill="none"/>
  <rect x="480" y="155" width="170" height="22" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="565" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">$ralph: retry on failure (max 3)</text>
</svg>
