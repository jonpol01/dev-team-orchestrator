<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="320" rx="16" fill="url(#bgGrad)"/>

  <!-- n8n Orchestration Layer -->
  <rect x="40" y="20" width="820" height="52" rx="10" fill="#1e293b" filter="url(#shadow)"/>
  <text x="450" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc" letter-spacing="1">n8n ORCHESTRATION LAYER</text>
  <text x="450" y="62" text-anchor="middle" font-size="10" fill="#94a3b8">Routes data between AI agents, K8s, GitHub, and Discord</text>

  <!-- Connector lines -->
  <line x1="140" y1="72" x2="140" y2="110" stroke="#64748b" stroke-width="2"/>
  <line x1="360" y1="72" x2="360" y2="110" stroke="#64748b" stroke-width="2"/>
  <line x1="580" y1="72" x2="580" y2="110" stroke="#64748b" stroke-width="2"/>
  <line x1="780" y1="72" x2="780" y2="110" stroke="#64748b" stroke-width="2"/>

  <!-- Intent Parser -->
  <rect x="50" y="110" width="180" height="190" rx="12" fill="#5865f2" filter="url(#shadow)"/>
  <text x="140" y="145" text-anchor="middle" font-size="32">&#x1F4AC;</text>
  <text x="140" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">INTENT</text>
  <text x="140" y="190" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">PARSER</text>
  <rect x="70" y="200" width="140" height="22" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="140" y="215" text-anchor="middle" font-size="10" fill="#c4c9f2">Fast LLM</text>
  <text x="140" y="240" text-anchor="middle" font-size="10" fill="#c4c9f2">Extracts task + repo</text>
  <text x="140" y="255" text-anchor="middle" font-size="10" fill="#c4c9f2">from natural language</text>
  <rect x="70" y="270" width="140" height="18" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="140" y="283" text-anchor="middle" font-size="8" font-weight="600" fill="#c4c9f2">Any phrasing works.</text>

  <!-- Architect -->
  <rect x="250" y="110" width="220" height="190" rx="12" fill="#6366f1" filter="url(#shadow)"/>
  <text x="360" y="145" text-anchor="middle" font-size="32">&#x1F9E0;</text>
  <text x="360" y="175" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">ARCHITECT</text>
  <rect x="280" y="190" width="160" height="22" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="360" y="205" text-anchor="middle" font-size="10" fill="#e0e7ff">Reasoning LLM</text>
  <text x="360" y="230" text-anchor="middle" font-size="10" fill="#c7d2fe">Plans steps, picks images,</text>
  <text x="360" y="245" text-anchor="middle" font-size="10" fill="#c7d2fe">scaffolds full projects,</text>
  <text x="360" y="260" text-anchor="middle" font-size="10" fill="#c7d2fe">decides deployment.</text>
  <rect x="290" y="272" width="140" height="18" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="360" y="285" text-anchor="middle" font-size="8" font-weight="600" fill="#e0e7ff">Never writes code.</text>

  <!-- Executor -->
  <rect x="490" y="110" width="180" height="190" rx="12" fill="#2563eb" filter="url(#shadow)"/>
  <text x="580" y="145" text-anchor="middle" font-size="32">&#x26A1;</text>
  <text x="580" y="175" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">EXECUTOR</text>
  <rect x="510" y="190" width="140" height="22" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="580" y="205" text-anchor="middle" font-size="10" fill="#bfdbfe">Reasoning LLM</text>
  <text x="580" y="230" text-anchor="middle" font-size="10" fill="#bfdbfe">Writes production-quality</text>
  <text x="580" y="245" text-anchor="middle" font-size="10" fill="#bfdbfe">code. Follows repo</text>
  <text x="580" y="260" text-anchor="middle" font-size="10" fill="#bfdbfe">patterns and style.</text>
  <rect x="510" y="272" width="140" height="18" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="580" y="285" text-anchor="middle" font-size="8" font-weight="600" fill="#bfdbfe">Fixes reviewer feedback.</text>

  <!-- Reviewer -->
  <rect x="690" y="110" width="170" height="190" rx="12" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="775" y="145" text-anchor="middle" font-size="32">&#x1F441;</text>
  <text x="775" y="175" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">REVIEWER</text>
  <rect x="710" y="190" width="130" height="22" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="775" y="205" text-anchor="middle" font-size="10" fill="#ddd6fe">Reasoning LLM</text>
  <text x="775" y="230" text-anchor="middle" font-size="10" fill="#ddd6fe">PASS/FAIL verdict</text>
  <text x="775" y="245" text-anchor="middle" font-size="10" fill="#ddd6fe">against acceptance</text>
  <text x="775" y="260" text-anchor="middle" font-size="10" fill="#ddd6fe">criteria.</text>
  <rect x="720" y="272" width="110" height="18" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="775" y="285" text-anchor="middle" font-size="8" font-weight="600" fill="#ddd6fe">Max 3 retries.</text>
</svg>