apiVersion: v1
kind: Namespace
metadata:
  name: dev-team
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-job-runner
  namespace: dev-team
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-runner
  namespace: dev-team
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-job-runner-binding
  namespace: dev-team
subjects:
  - kind: ServiceAccount
    name: n8n-job-runner
    namespace: dev-team
roleRef:
  kind: Role
  name: job-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-job-runner-token
  namespace: dev-team
  annotations:
    kubernetes.io/service-account.name: n8n-job-runner
type: kubernetes.io/service-account-token
